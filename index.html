<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia Barbi</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
  
  <!-- CSS externo -->
 <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
 <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav id="navbar" class="navbar navbar-expand-lg navbar-transparent">
  <div class="container">
    <a class="navbar-brand" href=>
      <img src="Logo minimalista da Barbi Academia.png" alt="Barbi Academia">
    </a>

    <button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="menu">
      <ul class="navbar-nav gap-3">
        <li class="nav-item"><a class="nav-link" href="#">Início</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Sobre</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Serviços</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contato</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CAROUSEL -->
<div id="carouselExample" class="carousel slide carousel-fade" data-bs-ride="carousel">

  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
  </div>

  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="Barbiacademia.interna.jpg" class="d-block w-100">
      <div class="carousel-caption">
        <h2>Transforme seu corpo</h2>
        <p>Treine com propósito</p>
        <button class="btn btn-custom">Começar</button>
      </div>
    </div>

    <div class="carousel-item">
      <img src="PromocaoAnual.jpeg" class="d-block w-100">
      <div class="carousel-caption">
        <h2></h2>
        <p></p>
      </div>
    </div>

    <div class="carousel-item">
      <img src="Fachada.webp" class="d-block w-100">
      <div class="carousel-caption">
        <h2></h2>
      </div>
    </div>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="container section">
  <div class="row">
    <div class="col-lg-6">
      <h2>Sobre a Academia</h2>
      <p>Ambiente moderno focado em performance e estética.</p>
    </div>

    <div class="col-lg-6">
      <div class="card card-clean">
        <img src="PromocaoAnual.jpeg" class="w-100">
      </div>
    </div>
  </div>
</div>

<footer>
  <p>Academia Barbi</p>
</footer>

<!-- JS NAVBAR SCROLL -->
<script>
  const navbar = document.getElementById("navbar");

  window.addEventListener("scroll", function () {
    if (window.scrollY > 50) {
      navbar.classList.add("navbar-scrolled");
    } else {
      navbar.classList.remove("navbar-scrolled");
    }
  });
</script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  

</body>
</html>
