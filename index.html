<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academia Barbi</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap"
      rel="stylesheet"
    />

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="navbar.css" />
    <link rel="stylesheet" href="hero.css" />
    <link rel="stylesheet" href="sections.css" />
    <link rel="stylesheet" href="footer.css" />
    <link rel="stylesheet" href="responsive.css" />
  </head>

  <body>
    <nav
      id="navbar"
      class="navbar navbar-expand-lg navbar-transparent fixed-top"
    >
      <div class="container">
        <a class="navbar-brand" href="#home">
          <img
            src="Logo minimalista da Barbi Academia.png"
            alt="Barbi Academia"
          />
        </a>

        <button
          class="navbar-toggler border-0 bg-light"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

    <div class="collapse navbar-collapse justify-content-end" id="menu">
      <ul class="navbar-nav gap-3">
        <li class="nav-item"><a class="nav-link" href="#">Início</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Sobre</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Serviços</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contato</a></li>
      </ul>
    </div>
  </div>
</nav>

    <!-- CAROUSEL -->
    <div id="home" class="carousel slide carousel-fade" data-bs-ride="carousel">
      <div class="carousel-indicators">
        <button
          type="button"
          data-bs-target="#home"
          data-bs-slide-to="0"
          class="active"
        ></button>
        <button
          type="button"
          data-bs-target="#home"
          data-bs-slide-to="1"
        ></button>
      </div>

  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="Barbiacademia.interna.jpg" class="d-block w-100">
      <div class="carousel-caption">
        <h2>Transforme seu corpo</h2>
        <p>Treine com propósito</p>
        <button class="btn btn-custom">Começar</button>
      </div>
    </div>

        <div class="carousel-item">
          <img src="Fachada.webp" class="d-block w-100" />
          <div class="carousel-caption hero-caption">
            <div class="hero-content">
              <span class="hero-subtitle">VISITE-NOS</span>
              <h1 class="hero-title">
                Estrutura<br /><span class="hero-highlight">de Ponta</span>
              </h1>
              <div class="hero-buttons">
                <button class="btn btn-hero btn-primary-hero">
                  Saiba Mais
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#home"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#home"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>

    <div class="carousel-item">
      <img src="Fachada.webp" class="d-block w-100">
      <div class="carousel-caption">
        <h2></h2>
      </div>
    </div>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="container section">
  <div class="row">
    <div class="col-lg-6">
      <h2>Sobre a Academia</h2>
      <p>Ambiente moderno focado em performance e estética.</p>
    </div>

    <div class="col-lg-6">
      <div class="card card-clean">
        <img src="PromocaoAnual.jpeg" class="w-100">
      </div>
    </div>
  </div>
</div>

<footer>
  <p>Academia Barbi</p>
</footer>

<!-- JS NAVBAR SCROLL -->
<script>
  const navbar = document.getElementById("navbar");

  window.addEventListener("scroll", function () {
    if (window.scrollY > 50) {
      navbar.classList.add("navbar-scrolled");
    } else {
      navbar.classList.remove("navbar-scrolled");
    }
  });
</script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  

</body>
</html>
